<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketLens Analysis</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="hero" id="hero">
        <div class="hero-content">
            <h1 class="title" id="title">MarketLens</h1>
            <p class="subtitle" id="subtitle">Loading...</p>
        </div>
    </header>

    <main class="analysis-workspace" id="analysis-workspace">
        <section class="panel panel-analysis" id="panel-analysis" aria-labelledby="analysis-heading" style="display: none;">
            <h2 id="analysis-heading">Analysis Results</h2>
            <p class="panel-copy"></p>
            <h3 id="analysis-summary"></h3>
            <div id="analysis-results" class="analysis-results">
                <!-- Analysis results will be dynamically inserted here for each ticker -->
            </div>
        </section>
    </main>

    <template id="ticker-analysis-template">
        <div class="ticker-analysis">
            <h4 class="ticker-name"></h4>
            <p class="ticker-summary"></p>
            <div class="key-findings">
                <h5>Key Findings:</h5>
                <ul class="findings-list">
                    <!-- Key findings will be dynamically inserted here. Contains information about related interest, finding, signal, confidence, and data evidence -->
                </ul>
            </div>
            <div class="watchpoints">
                <h5>Watchpoints:</h5>
                <ul class="watchpoints-list">
                    <!-- Watchpoints will be dynamically inserted here. -->
                </ul>
            </div>
        </div>
    </template>

    <script src="/js/api.js"></script>
    <script src="/js/analysis.js"></script>
</body>
</html>
